name: Fastlane CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:
    inputs:
      task:
        description: 'Fastlane task to run'
        required: true
        default: 'build_hap'
        type: choice
        options:
          - build_hap
          - build_app_package
          - test
          - deploy

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '17'

jobs:
  fastlane-harmony:
    name: Fastlane Harmony Build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache ohpm modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.ohos
            ~/.ohpm
          key: ${{ runner.os }}-ohpm-${{ hashFiles('**/oh-package.json5') }}
          restore-keys: |
            ${{ runner.os }}-ohpm-

      - name: Cache hvigor build
        uses: actions/cache@v4
        with:
          path: |
            ~/.hvigor
            **/.hvigor
          key: ${{ runner.os }}-hvigor-${{ hashFiles('**/hvigor') }}
          restore-keys: |
            ${{ runner.os }}-hvigor-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: './electron'

      - name: Install fastlane
        working-directory: ./electron
        run: |
          bundle install

      - name: Cache HarmonyOS Command Line Tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.harmony-tools
            ${{ github.workspace }}/.harmony-tools
          key: harmony-tools-${{ runner.os }}-5.0.3.810
          restore-keys: |
            harmony-tools-${{ runner.os }}-

      - name: Setup HarmonyOS Command Line Tools
        env:
          HARMONY_COMMANDLINE_TOOLS_URL: ${{ secrets.HARMONY_COMMANDLINE_TOOLS_URL }}
        run: |
          tools_dir="${{ github.workspace }}/.harmony-tools"
          tools_zip="commandline-tools-mac-arm64-5.0.3.810.zip"
          tools_unzip="${tools_dir}/unzip/5.0.3.810"
          tools_home="${tools_unzip}/command-line-tools"
          app_tools="/Applications/DevEco-Studio.app/Contents/tools"
          user_tools="${HOME}/DevEco-Studio/tools"

          mkdir -p "${tools_dir}"

          valid_tools_home() {
            local home="$1"
            { [ -x "${home}/ohpm/bin/ohpm" ] && [ -x "${home}/hvigor/bin/hvigorw" ]; } ||
              { [ -x "${home}/bin/ohpm" ] && [ -x "${home}/bin/hvigorw" ]; }
          }

          use_tools_home() {
            local home="$1"
            echo "HM_COMMAND_LINE_TOOLS_HOME=${home}" >> $GITHUB_ENV
            echo "HARMONY_TOOLS_AVAILABLE=true" >> $GITHUB_ENV
          }

          validate_and_use_tools_home() {
            local home="$1"
            if valid_tools_home "${home}"; then
              use_tools_home "${home}"
            else
              echo "::error::HarmonyOS tools were found or extracted, but ${home} does not contain executable ohpm and hvigorw."
              exit 1
            fi
          }

          # Check if tools already exist from cache
          if valid_tools_home "${tools_home}"; then
            echo "✅ Tools found at ${tools_home}"
            use_tools_home "${tools_home}"
          elif [ -f "${tools_dir}/${tools_zip}" ]; then
            echo "📦 Found zip file, extracting..."
            mkdir -p "${tools_unzip}"
            unzip -q "${tools_dir}/${tools_zip}" -d "${tools_unzip}"
            validate_and_use_tools_home "${tools_home}"
          elif [ -n "${HARMONY_COMMANDLINE_TOOLS_URL}" ]; then
            echo "📥 Downloading HarmonyOS Command Line Tools from secret URL..."
            curl -fL "${HARMONY_COMMANDLINE_TOOLS_URL}" -o "${tools_dir}/${tools_zip}"
            mkdir -p "${tools_unzip}"
            unzip -q "${tools_dir}/${tools_zip}" -d "${tools_unzip}"
            validate_and_use_tools_home "${tools_home}"
          elif valid_tools_home "${app_tools}"; then
            echo "✅ DevEco Studio tools found at ${app_tools}"
            use_tools_home "${app_tools}"
          elif valid_tools_home "${user_tools}"; then
            echo "✅ DevEco Studio tools found at ${user_tools}"
            use_tools_home "${user_tools}"
          else
            echo "⚠️  HarmonyOS Command Line Tools not found in cache"
            echo ""
            echo "To enable CI:"
            echo "1. Download tools from DevEco Studio or https://developer.huawei.com/consumer/cn/download/command-line-tools-for-hmos"
            echo "2. Put ${tools_zip} in ${tools_dir} on a self-hosted runner, install DevEco Studio, or set HARMONY_COMMANDLINE_TOOLS_URL"
            echo "3. Re-run this workflow"
            echo "HARMONY_TOOLS_AVAILABLE=false" >> $GITHUB_ENV
            {
              echo "## HarmonyOS build skipped"
              echo ""
              echo "HarmonyOS Command Line Tools were not available on this runner."
              echo "Use a self-hosted macOS runner with DevEco Studio installed, cache ${tools_zip}, or set the HARMONY_COMMANDLINE_TOOLS_URL secret."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run Fastlane
        if: env.HARMONY_TOOLS_AVAILABLE == 'true'
        working-directory: ./electron
        run: |
          task="${{ github.event.inputs.task || 'build_hap' }}"
          echo "Running fastlane lane: $task"
          bundle exec fastlane $task

      - name: Skip Fastlane
        if: env.HARMONY_TOOLS_AVAILABLE != 'true'
        run: |
          echo "Skipping fastlane because HarmonyOS Command Line Tools are unavailable on this runner."

      - name: Upload HAP artifact
        if: env.HARMONY_TOOLS_AVAILABLE == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: harmony-hap
          path: |
            **/build/**/*.hap
            **/outputs/**/*.hap
          retention-days: 30

      - name: Upload APP artifact
        if: env.HARMONY_TOOLS_AVAILABLE == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: harmony-app
          path: |
            **/build/**/*.app
            **/outputs/**/*.app
          retention-days: 30

  # Optional: Deploy job that runs only on specific conditions
  deploy:
    name: Deploy to Distribution
    needs: fastlane-harmony
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'deploy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Deploy to server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # Add your deployment commands here
          echo "Deploying to distribution server..."
          # Example: scp/minio upload, etc.
